<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Syamimi's Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.4/chart.umd.min.js"></script>
<style>
:root{
  --paper:#FAF6F0; --card:#FFFFFF; --ink:#33303A; --muted:#8A8594; --line:#ECE4D9;
  --plum:#8E5A79; --plum-soft:#F3E7EE;
  --sage:#6E9080; --sage-soft:#E6EFE9;
  --gold:#C08A3E; --gold-soft:#F6EAD3;
  --rose:#C77D9A; --rose-soft:#F7E6EE;
  --ok:#5B8C6E; --ok-bg:#E4EFE7;
  --warn:#C08A3E; --warn-bg:#F6EAD3;
  --risk:#C0554E; --risk-bg:#F6E1DF;
  --muted-bg:#EFEBE4;
  --shadow:0 1px 2px rgba(51,48,58,.04), 0 6px 20px rgba(51,48,58,.06);
  --radius:16px;
}
*{box-sizing:border-box}

/* ---- theme presets (default "paper" lives in :root above) ---- */
[data-theme="sage"]{
  --paper:#F4F7F0; --card:#FFFFFF; --ink:#2E3B32; --muted:#7C8A7E; --line:#DCE6D8;
  --plum:#5B7F6B; --plum-soft:#E3EEE4;
  --sage:#A97C50; --sage-soft:#F3E6D8;
  --gold:#C9A227; --gold-soft:#F5EFCF;
  --rose:#B4667A; --rose-soft:#F5E1E6;
  --ok:#4F8B5E; --ok-bg:#E1EFE2;
  --warn:#C9A227; --warn-bg:#F5EFCF;
  --risk:#B3524A; --risk-bg:#F5DEDB;
  --muted-bg:#EAEFE6;
}
[data-theme="midnight"]{
  --paper:#221E27; --card:#2B2530; --ink:#EDE7F0; --muted:#A79CB0; --line:#3B3441;
  --plum:#C98FB0; --plum-soft:#3A2E38;
  --sage:#8FB39E; --sage-soft:#2B3630;
  --gold:#E0B26B; --gold-soft:#3A3020;
  --rose:#E0A0B8; --rose-soft:#3A2A32;
  --ok:#7FBF95; --ok-bg:#22352A;
  --warn:#E0B26B; --warn-bg:#3A3020;
  --risk:#E08A80; --risk-bg:#3A2624;
  --muted-bg:#332D39;
  --shadow:0 1px 2px rgba(0,0,0,.25), 0 6px 20px rgba(0,0,0,.35);
}
[data-theme="rose"]{
  --paper:#FBF1F3; --card:#FFFFFF; --ink:#3A2A32; --muted:#9C8188; --line:#F0DCE1;
  --plum:#A85C7A; --plum-soft:#F5E3EA;
  --sage:#7FA08D; --sage-soft:#E7F0EA;
  --gold:#CC9A54; --gold-soft:#F6ECD9;
  --rose:#D98BA6; --rose-soft:#FBEAF0;
  --ok:#5B8C6E; --ok-bg:#E4EFE7;
  --warn:#CC9A54; --warn-bg:#F6ECD9;
  --risk:#C0554E; --risk-bg:#F6E1DF;
  --muted-bg:#F3E7EA;
}
[data-theme="ocean"]{
  --paper:#F1F6F7; --card:#FFFFFF; --ink:#223138; --muted:#7C939C; --line:#DCE8EB;
  --plum:#3E7C8A; --plum-soft:#E1EEF0;
  --sage:#5C9C86; --sage-soft:#E3F0EA;
  --gold:#C79A4B; --gold-soft:#F5ECD7;
  --rose:#A8708A; --rose-soft:#F0E2EA;
  --ok:#4F8B72; --ok-bg:#E1EFE8;
  --warn:#C79A4B; --warn-bg:#F5ECD7;
  --risk:#C05C52; --risk-bg:#F5E0DD;
  --muted-bg:#E9F1F2;
}
html{background:var(--paper)}
body{transition:background-color .25s ease, color .25s ease}
.card,.panel,.sidebar,.modal-box{transition:background-color .25s ease, border-color .25s ease}

html,body{margin:0;height:100%}
body{
  font-family:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:var(--paper); color:var(--ink); -webkit-font-smoothing:antialiased;
  font-size:15px; line-height:1.5;
}
h1,h2{font-family:"Fraunces",Georgia,serif; font-weight:600; letter-spacing:-.01em; margin:0}
h1{font-size:26px}
h2{font-size:17px}
em{font-style:italic}
button{font-family:inherit; cursor:pointer}
.mono{font-variant-numeric:tabular-nums; font-feature-settings:"tnum"}

/* layout */
.app{display:flex; min-height:100%}
.sidebar{
  width:236px; flex:0 0 236px; background:#fff; border-right:1px solid var(--line);
  display:flex; flex-direction:column; position:sticky; top:0; height:100vh;
}
.brand{padding:22px 20px 14px}
.brand .mark{font-family:"Fraunces",serif; font-size:19px; font-weight:600}
.brand .sub{font-size:12px; color:var(--muted); margin-top:2px}
.nav{padding:6px 12px; overflow-y:auto; flex:1}
.nav a{
  display:flex; align-items:center; gap:10px; padding:9px 12px; border-radius:10px;
  color:var(--ink); text-decoration:none; font-size:14px; font-weight:500; cursor:pointer;
  margin-bottom:2px;
}
.nav a:hover{background:var(--paper)}
.nav a.active{background:var(--plum-soft); color:var(--plum)}
.dot{width:9px; height:9px; border-radius:50%; flex:0 0 auto}
.dot.plum{background:var(--plum)} .dot.sage{background:var(--sage)}
.dot.gold{background:var(--gold)} .dot.rose{background:var(--rose)}
.dot.coral{background:#FF7A45}
.side-foot{padding:12px; border-top:1px solid var(--line); display:flex; gap:8px}
.side-foot .btn{flex:1; font-size:12px; padding:8px}
.theme-row{display:flex; gap:9px; padding:14px 20px 6px}
.theme-dot{width:23px; height:23px; border-radius:50%; border:2px solid transparent;
  box-shadow:0 0 0 1px var(--line) inset; padding:0; flex:0 0 auto}
.theme-dot.active{border-color:var(--ink); box-shadow:0 0 0 2px var(--card), 0 0 0 3px var(--ink)}
.theme-label{padding:0 20px; font-size:11px; color:var(--muted); font-weight:600; text-transform:uppercase; letter-spacing:.06em; margin-top:2px}

.main{flex:1; min-width:0; display:flex; flex-direction:column}
.topbar{display:none}
#view{padding:28px 34px 60px; max-width:920px; margin:0 auto; width:100%}

/* headers */
.shead{display:flex; justify-content:space-between; align-items:flex-end; gap:16px; margin-bottom:20px}
.lead{color:var(--muted); margin:6px 0 0; font-size:14px; max-width:60ch}
.panel{background:var(--card); border:1px solid var(--line); border-radius:var(--radius);
  padding:16px 18px; margin-bottom:16px; box-shadow:var(--shadow)}
.phead{display:flex; justify-content:space-between; align-items:center; margin-bottom:10px}

/* buttons */
.btn{border:1px solid var(--line); background:#fff; color:var(--ink); border-radius:10px;
  padding:8px 14px; font-size:13px; font-weight:500}
.btn:hover{border-color:var(--plum); color:var(--plum)}
.btn.primary{background:var(--plum); color:#fff; border-color:var(--plum)}
.btn.primary:hover{background:#7d4d6a; color:#fff}
.btn.ghost{background:transparent}
.btn.sm{padding:5px 10px; font-size:12px}
.icon{border:none; background:transparent; color:var(--muted); font-size:14px; padding:4px 6px; border-radius:6px}
.icon:hover{background:var(--paper); color:var(--plum)}
.icon.tiny{font-size:11px; opacity:0; transition:opacity .15s}
.habrow:hover .icon.tiny{opacity:.6}

/* lists */
.list{display:flex; flex-direction:column}
.listrow{display:flex; align-items:center; gap:12px; padding:11px 4px; border-bottom:1px solid var(--line)}
.listrow:last-child{border-bottom:none}
.listrow.static{padding:9px 4px}
.cell{flex:0 0 auto}
.cell.grow{flex:1 1 auto; min-width:0}
.cell.actions{display:flex; gap:2px; opacity:0; transition:opacity .15s}
.listrow:hover .cell.actions{opacity:1}
.sub{color:var(--muted); font-size:12.5px; margin-top:2px}
.empty{color:var(--muted); font-size:13.5px; padding:14px 4px; font-style:italic}

/* badges */
.badge{display:inline-block; padding:2px 9px; border-radius:20px; font-size:11.5px; font-weight:600; white-space:nowrap}
.badge.ok{background:var(--ok-bg); color:var(--ok)}
.badge.warn{background:var(--warn-bg); color:var(--warn)}
.badge.risk{background:var(--risk-bg); color:var(--risk)}
.badge.muted{background:var(--muted-bg); color:var(--muted)}

/* hero + dashboard */
.hero{margin-bottom:22px}
.hero-greet{font-family:"Fraunces",serif; font-size:32px; font-weight:600; letter-spacing:-.02em}
.hero-date{color:var(--muted); margin-top:4px}
.hero-focus{margin-top:8px; font-size:14px}
.dash-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:14px; margin-bottom:18px}
.card{background:var(--card); border:1px solid var(--line); border-radius:var(--radius); padding:18px; box-shadow:var(--shadow)}
.accent-gold{border-top:3px solid var(--gold)}
.viva-card{display:flex; flex-direction:column; justify-content:center; align-items:flex-start; gap:2px}
.viva-card .big{font-family:"Fraunces",serif; font-size:42px; font-weight:600; line-height:1}
.viva-card .big.tbc{font-size:30px; color:var(--gold)}
.biglabel{color:var(--muted); font-size:12.5px; margin-bottom:8px}
.ring-card{display:flex; align-items:center; gap:14px}
.ring{width:96px; height:96px; flex:0 0 auto}
.ring-bg{fill:none; stroke:var(--muted-bg); stroke-width:12}
.ring-fg{fill:none; stroke:var(--sage); stroke-width:12; stroke-linecap:round; transform:rotate(-90deg); transform-origin:center; transition:stroke-dashoffset .6s ease}
.ring-pct{font-family:"Fraunces",serif; font-size:22px; font-weight:600; fill:var(--ink); text-anchor:middle}
.ring-sub{font-size:9px; fill:var(--muted); text-anchor:middle; text-transform:uppercase; letter-spacing:.08em}
.ring-meta{font-size:13px; line-height:1.5}
.stat-card{display:flex; flex-direction:column; justify-content:center; gap:10px}
.stat{display:flex; align-items:baseline; gap:8px}
.statnum{font-family:"Fraunces",serif; font-size:22px; font-weight:600; min-width:52px}
.statlab{color:var(--muted); font-size:12.5px}
.quotes blockquote{margin:0 0 10px; padding:10px 14px; background:var(--plum-soft); border-radius:10px;
  color:var(--plum); font-size:13.5px; border:none}
.quotes blockquote:last-child{margin-bottom:0}

/* banner */
.nudge{background:var(--warn-bg); color:var(--warn); border:1px solid var(--warn);
  border-radius:12px; padding:10px 14px; margin-bottom:16px; font-size:13.5px}
.banner{background:var(--gold-soft); border:1px solid #eaddc2; border-radius:12px; padding:12px 16px;
  margin-bottom:16px; font-size:14px; display:flex; align-items:center; gap:12px; flex-wrap:wrap}

/* checklists */
.check{display:flex; flex-direction:column; gap:2px}
.checkrow{display:flex; align-items:flex-start; gap:10px; padding:7px 4px; font-size:14px; cursor:pointer}
.checkrow input{margin-top:3px; accent-color:var(--plum); width:16px; height:16px; flex:0 0 auto}
.checkrow input:checked + span{color:var(--muted); text-decoration:line-through}

/* reference tables */
.reftable{width:100%; border-collapse:collapse; font-size:13.5px}
.reftable td{padding:8px 10px; border-bottom:1px solid var(--line); vertical-align:top}
.reftable tr:last-child td{border-bottom:none}
.reftable .rk{font-weight:600; width:44%}
.avoid{display:flex; flex-direction:column; gap:10px}
.avoidrow{border-left:3px solid var(--line); padding:2px 0 2px 12px}
.av-x{color:var(--risk); font-size:13px; font-weight:500}
.av-ok{color:var(--ok); font-size:13px; margin-top:3px}
.verb{margin-bottom:14px}
.verb:last-child{margin-bottom:0}
.verb-t{font-weight:600; font-size:13px; margin-bottom:6px}
.verb blockquote{margin:0; padding:12px 16px; background:var(--sage-soft); border-radius:10px;
  font-size:13.5px; line-height:1.6; border:none}
.mini{margin:4px 0 12px; padding-left:20px}
.mini li{font-size:13px; color:var(--muted); margin-bottom:4px}

/* calendar */
.cal{margin-bottom:2px}
.calhead{display:flex; align-items:center; justify-content:space-between; margin-bottom:12px}
.calhead-mid{display:flex; align-items:baseline; gap:10px; font-family:"Fraunces",serif; font-size:15px}
.caltoday{font-family:"Inter",sans-serif; font-size:11.5px; color:var(--plum); font-weight:600;
  cursor:pointer; text-decoration:underline}
.calarrow{font-size:18px; padding:2px 10px}
.calgrid{display:grid; grid-template-columns:repeat(7,1fr); gap:4px}
.calgrid.caldow{margin-bottom:4px}
.calcell{aspect-ratio:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
  border-radius:10px; font-size:13px; position:relative}
.calcell.dowlabel{font-size:10.5px; color:var(--muted); font-weight:600; aspect-ratio:auto; padding:2px 0}
.calcell.has{cursor:pointer; background:var(--plum-soft)}
.calcell.has:hover{background:var(--rose-soft)}
.calcell.today{box-shadow:inset 0 0 0 1.5px var(--plum)}
.calcell.today .calnum{color:var(--plum); font-weight:700}
.calnum{line-height:1}
.caldot{width:5px; height:5px; border-radius:50%; background:var(--plum); margin-top:3px}
.listrow.pulse{animation:pulseRow 1.4s ease}
@keyframes pulseRow{0%{background:var(--gold-soft)} 100%{background:transparent}}
@media (max-width:860px){
  .calcell{font-size:12px}
  .calnum{font-size:12px}
}

/* money */
.goal-top{display:flex; justify-content:space-between; font-size:14px; margin-bottom:8px}
.bar{height:12px; background:var(--muted-bg); border-radius:20px; overflow:hidden}
.bar-fg{height:100%; background:linear-gradient(90deg,var(--gold),var(--rose)); border-radius:20px; transition:width .6s ease}
.goal-actions{display:flex; justify-content:space-between; align-items:center; margin-top:10px}

/* habits grid */
.habits{width:100%}
.habrow{display:flex; align-items:center; border-bottom:1px solid var(--line)}
.habrow:last-child{border-bottom:none}
.habrow.head{border-bottom:2px solid var(--line)}
.habname{flex:1 1 auto; padding:10px 6px; font-size:13.5px; display:flex; align-items:center; gap:6px}
.habcell{flex:0 0 40px; text-align:center; padding:8px 0}
.habcell.hdr{font-size:11px; color:var(--muted); font-weight:600; line-height:1.2}
.habcell.hdr span{display:block; font-size:12px; color:var(--ink)}
.habcell.hdr.today{color:var(--plum)}
.habcell.hdr.today span{color:var(--plum)}
.habcell input{accent-color:var(--sage); width:18px; height:18px; cursor:pointer}
.addhabit{display:flex; gap:8px; margin:-6px 0 16px}
.addhabit input{flex:1; padding:9px 12px; border:1px solid var(--line); border-radius:10px; font-family:inherit; font-size:14px}

/* modal */
.modal{position:fixed; inset:0; display:none; align-items:center; justify-content:center; z-index:50}
.modal.show{display:flex}
#modalBackdrop{position:absolute; inset:0; background:rgba(51,48,58,.35)}
.modal-box{position:relative; background:#fff; border-radius:var(--radius); width:min(460px,92vw);
  max-height:88vh; overflow-y:auto; box-shadow:0 20px 60px rgba(51,48,58,.25)}
.modal-head{padding:18px 20px 6px}
.modal-head h3{margin:0; font-family:"Fraunces",serif; font-weight:600; font-size:18px}
#modalBody{padding:8px 20px}
#modalBody label{display:block; font-size:12.5px; color:var(--muted); font-weight:600; margin-bottom:12px}
#modalBody input,#modalBody select,#modalBody textarea{
  display:block; width:100%; margin-top:5px; padding:9px 11px; border:1px solid var(--line);
  border-radius:10px; font-family:inherit; font-size:14px; color:var(--ink); background:#fff}
#modalBody textarea{min-height:64px; resize:vertical}
.modal-foot{padding:12px 20px 18px; display:flex; gap:10px; justify-content:flex-end}

@media (max-width:860px){
  .sidebar{position:fixed; left:0; top:0; z-index:40; transform:translateX(-100%); transition:transform .25s ease; box-shadow:var(--shadow)}
  .sidebar.open{transform:translateX(0)}
  .sidebar.open ~ .main #drawerBackdrop{display:block}
  #drawerBackdrop{display:none; position:fixed; inset:0; background:rgba(51,48,58,.3); z-index:35}
  .topbar{display:flex; align-items:center; gap:12px; padding:12px 16px; background:#fff; border-bottom:1px solid var(--line); position:sticky; top:0; z-index:10}
  .topbar .mark{font-family:"Fraunces",serif; font-weight:600; font-size:17px}
  #menuBtn{border:none; background:transparent; font-size:22px; line-height:1; padding:2px 6px}
  #view{padding:20px 16px 60px}
  .dash-grid{grid-template-columns:1fr}
  .hero-greet{font-size:26px}
  .habcell{flex:0 0 34px}
}

/* ================= Pocket (daily spending) — its own visual identity ================= */
.pk-root{
  --pk-ink:#241B2E; --pk-muted:#7A7290; --pk-line:#EFE9F2; --pk-card:#FFFFFF;
  --pk-violet:#5B3FD6; --pk-amber:#F59E0B; --pk-green:#2FA968; --pk-coral:#FF7A45;
  font-family:'Plus Jakarta Sans',system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
  color:var(--pk-ink);
}
.pk-wrap{max-width:480px; padding-bottom:20px; position:relative}
.pk-display{font-family:'Bricolage Grotesque',system-ui,sans-serif; font-weight:800; letter-spacing:-.02em}
.pk-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:20px}
.pk-hi{font-size:15px; color:var(--pk-muted); font-weight:600}
.pk-hi b{color:var(--pk-ink)}
.pk-streak{display:flex; align-items:center; gap:5px; background:#FFF; border:1px solid var(--pk-line);
  border-radius:999px; padding:6px 11px 6px 9px; font-weight:700; font-size:13px;
  box-shadow:0 2px 10px rgba(91,63,214,.06)}
.pk-streak .flame{font-size:15px}
.pk-streak.dim{color:var(--pk-muted); font-weight:600}
.pk-hero{margin-bottom:6px}
.pk-label{font-size:12.5px; letter-spacing:.08em; text-transform:uppercase; color:var(--pk-muted); font-weight:700}
.pk-total{font-size:48px; line-height:1.02; margin:4px 0 2px}
.pk-total .cur{font-size:24px; color:var(--pk-muted); font-weight:700; margin-right:6px; vertical-align:5px}
.pk-total.neg{color:var(--pk-amber)}
.pk-inout{display:flex; gap:18px; margin-top:6px}
.pk-io{display:flex; align-items:center; gap:7px; font-size:13.5px; font-weight:600; color:#5b5470}
.pk-iodot{width:9px; height:9px; border-radius:3px; flex:none}
.pk-stream{display:flex; height:18px; border-radius:999px; overflow:hidden; margin:16px 0 12px;
  background:#EDE7F3; box-shadow:inset 0 1px 2px rgba(0,0,0,.05)}
.pk-seg{height:100%; width:0; transition:width .9s cubic-bezier(.2,.8,.2,1)}
.pk-legend{display:flex; flex-wrap:wrap; gap:10px 14px}
.pk-leg{display:flex; align-items:center; gap:6px; font-size:12.5px; font-weight:600; color:#5b5470}
.pk-dot{width:9px; height:9px; border-radius:3px; flex:none}
.pk-addbtn{width:100%; border:none; cursor:pointer; background:var(--pk-violet); color:#fff;
  font-weight:700; font-size:16px; font-family:'Plus Jakarta Sans',inherit; padding:15px;
  border-radius:18px; box-shadow:0 10px 26px rgba(91,63,214,.28); margin:18px 0 24px;
  transition:transform .12s ease, box-shadow .12s ease}
.pk-addbtn:active{transform:scale(.975); box-shadow:0 6px 16px rgba(91,63,214,.28)}
.pk-importrow{text-align:center; margin:-16px 0 24px}
.pk-importlink{font-size:12px; color:var(--pk-muted); text-decoration:underline; cursor:pointer}
.pk-sec{margin-top:26px}
.pk-sec-h{font-size:13px; letter-spacing:.06em; text-transform:uppercase; color:var(--pk-muted);
  font-weight:700; margin-bottom:12px}
.pk-row{display:flex; align-items:center; gap:12px; padding:11px 0; cursor:pointer; transition:opacity .1s ease}
.pk-row:active{opacity:.6}
.pk-seeall{text-transform:none; letter-spacing:0; font-weight:700; color:var(--pk-violet); cursor:pointer; font-size:12.5px}
.pk-emoji{width:38px; height:38px; border-radius:12px; display:grid; place-items:center; font-size:18px; flex:none}
.pk-rowmid{flex:1; min-width:0}
.pk-rowtop{display:flex; justify-content:space-between; align-items:baseline; gap:8px}
.pk-cat{font-weight:700; font-size:14.5px}
.pk-amt{font-weight:700; font-size:14.5px}
.pk-bar{height:6px; border-radius:999px; background:#EDE7F3; margin-top:7px; overflow:hidden}
.pk-bar i{display:block; height:100%; width:0; border-radius:999px; transition:width .9s cubic-bezier(.2,.8,.2,1)}
.pk-pct{font-size:11.5px; color:var(--pk-muted); font-weight:600}
.pk-tx{display:flex; align-items:center; gap:12px; padding:10px 0; border-top:1px solid var(--pk-line)}
.pk-tx:first-child{border-top:none}

    return Object.assign(seed(), JSON.parse(raw));
  } catch (e) { return seed(); }
}
function save() {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(DB)); }
  catch (e) { alert("Couldn't save — browser storage may be full or blocked."); }
}

  return `<div class="list">${arr.map((r) => `

        <button class="icon" data-act="del" title="Delete">✕</button>
      </div>
    </div>`).join("")}</div>`;
}

let modalCtx = null;
function openForm(coll, id) {
  const cfg = COLLECTIONS[coll];
  const arr = getArr(coll);
  const rec = id ? arr.find((r) => r.id === id) : {};
  modalCtx = { coll, id };
  $("#modalTitle").textContent = (id ? "Edit" : "Add") + " · " + labelFor(coll);
  $("#modalBody").innerHTML = cfg.fields.map((f) => {
    const v = rec[f.key] != null ? rec[f.key] : "";
    if (f.type === "textarea")
      return `<label>${esc(f.label)}<textarea data-f="${f.key}">${esc(v)}</textarea></label>`;
    if (f.type === "select")
      return `<label>${esc(f.label)}<select data-f="${f.key}">${f.options.map((o) =>
        `<option ${o === v ? "selected" : ""}>${esc(o)}</option>`).join("")}</select></label>`;
    return `<label>${esc(f.label)}<input data-f="${f.key}" type="${f.type}" value="${esc(v)}"></label>`;
  }).join("");
  $("#modal").classList.add("show");
}
function closeForm() { $("#modal").classList.remove("show"); modalCtx = null; }
function submitForm() {
  if (!modalCtx) return;
  const { coll, id } = modalCtx;
  const cfg = COLLECTIONS[coll];
  const rec = {};
  $$("[data-f]", $("#modalBody")).forEach((el) => { rec[el.dataset.f] = el.value.trim(); });
  const missing = cfg.fields.find((f) => f.req && !rec[f.key]);
  if (missing) { alert(missing.label + " is required."); return; }
  cfg.fields.forEach((f) => { if (f.type === "number") rec[f.key] = rec[f.key] === "" ? "" : Number(rec[f.key]); });
  const arr = getArr(coll);
  if (id) { const i = arr.findIndex((r) => r.id === id); arr[i] = Object.assign(arr[i], rec); }
  else { rec.id = uid(); arr.unshift(rec); }
  save(); closeForm(); render();
}
function getArr(coll) { return DB[coll]; }
function labelFor(coll) { return ({
  tasks: "Task", modelRuns: "Model run", literature: "Reference", writing: "Chapter",
  expenses: "Entry", skincare: "Product", dates: "Date", contacts: "Contact",
  weekly: "Weekly review", notes: "Note", questionBank: "Question", weakSpots: "Weak spot",
})[coll] || "Item"; }

  const rose = cssVar('--rose'), sage = cssVar('--sage'), gold = cssVar('--gold');
  const muted = cssVar('--muted'), ink = cssVar('--ink'), line = cssVar('--line');
  const palette = ['--rose','--sage','--gold','--plum','--rose-soft','--sage-soft','--gold-soft'].map(cssVar);

  const expenses = DB.expenses || [];
  const fmtRM = (n) => 'RM ' + Number(n).toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2});
  const monthLabel = (k) => new Date(k + '-01').toLocaleDateString(undefined, {month:'short', year:'numeric'});

  // category breakdown (Expense rows only)
  const catTotals = {};
  expenses.filter(e => e.type === 'Expense').forEach(e => {
    const c = e.category || 'Other';
    catTotals[c] = (catTotals[c]||0) + Number(e.amount || 0);
  });
  const catLabels = Object.keys(catTotals);
  Chart.getChart('catChart')?.destroy();
  new Chart($('#catChart'), {
    type: 'doughnut',
    data: { labels: catLabels, datasets: [{ data: catLabels.map(c=>catTotals[c]), backgroundColor: palette, borderWidth:0 }] },
    options: { plugins:{ legend:{ position:'bottom', labels:{ color: ink, boxWidth:10, font:{size:11} } },
      tooltip:{ callbacks:{ label: ctx => ' '+ctx.label+': '+fmtRM(ctx.raw) } } }, cutout:'58%' }
  });

  // monthly grouping (shared by bar + line + list)
  const months = {};
  expenses.forEach(e => {
    const key = (e.date || '').slice(0,7);
    if (!key) return;
    months[key] = months[key] || { Income:0, Expense:0, Saving:0, items:[] };
    months[key][e.type] = (months[key][e.type]||0) + Number(e.amount || 0);
    months[key].items.push(e);
  });
  const monthKeys = Object.keys(months).sort();

  Chart.getChart('flowBarChart')?.destroy();
  new Chart($('#flowBarChart'), {
    type:'bar',
    data:{ labels: monthKeys.map(monthLabel), datasets:[
      { label:'Income', data: monthKeys.map(k=>months[k].Income), backgroundColor: sage },
      { label:'Expense', data: monthKeys.map(k=>months[k].Expense), backgroundColor: rose },
      { label:'Saving', data: monthKeys.map(k=>months[k].Saving), backgroundColor: gold }
    ]},
    options:{ plugins:{ legend:{ position:'bottom', labels:{ color: ink, boxWidth:10, font:{size:11} } } },
      scales:{ x:{ ticks:{color:muted}, grid:{color:line} }, y:{ ticks:{ color:muted, callback:v=>'RM '+v }, grid:{color:line} } } }
  });

  Chart.getChart('netLineChart')?.destroy();
  new Chart($('#netLineChart'), {
    type:'line',
    data:{ labels: monthKeys.map(monthLabel), datasets:[{
      label:'Net (Income − Expense)', data: monthKeys.map(k=>months[k].Income - months[k].Expense),
      borderColor: rose, backgroundColor: rose+'22', fill:true, tension:.3, pointRadius:4, pointBackgroundColor: rose
    }]},
    options:{ plugins:{ legend:{display:false}, tooltip:{ callbacks:{ label: ctx => ' '+fmtRM(ctx.raw) } } },
      scales:{ x:{ ticks:{color:muted}, grid:{color:line} }, y:{ ticks:{ color:muted, callback:v=>'RM '+v }, grid:{color:line} } } }
  });

  // grouped-by-month transaction list
  const wrap = $('#moneyMonthGroups');
  if (wrap) {
    wrap.innerHTML = monthKeys.slice().reverse().map(k => {
      const m = months[k], net = m.Income - m.Expense;
      const rows = m.items.slice().sort((a,b)=>b.date.localeCompare(a.date)).map(e => `
        <div class="mrow">
          <div class="cell grow"><strong>${esc(e.item)}</strong><div class="sub">${esc(e.category||'')} · ${fmtDate(e.date)}</div></div>
          <div class="cell mono m-${e.type}">${e.type==='Expense'?'−':'+'} ${fmtRM(e.amount)}</div>
        </div>`).join('');
      return `<details class="mgroup" ${k===monthKeys[monthKeys.length-1] ? 'open' : ''}>
        <summary><span>${monthLabel(k)}</span><span class="sub">Net ${fmtRM(net)}</span></summary>
        ${rows}
      </details>`;
    }).join('');
  }
}

  const days = [...Array(7)].map((_, i) => { const d = new Date(mon); d.setDate(mon.getDate() + i); return d; });

function simpleCollectionView(coll, title, sub) {

}

function viewPocket() {
  return sectionHeader("Pocket", "Daily spending — its own log, separate from the big-picture Expenses & Savings above.") +
    `<div class="pk-root"><div class="pk-wrap" id="pkApp"></div></div>`;
}

function firstOfMonth(d) { const x = new Date(d); x.setDate(1); x.setHours(0, 0, 0, 0); return x; }
let calCursor = firstOfMonth(new Date());

function calendarHTML(cursor) {
  const year = cursor.getFullYear(), month = cursor.getMonth();
  const first = new Date(year, month, 1);
  const startOffset = (first.getDay() + 6) % 7; // Mon = 0
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const today = todayISO();
  const byDate = {};
  DB.dates.forEach((d) => { if (d.date) (byDate[d.date] = byDate[d.date] || []).push(d); });

  const monthLabel = cursor.toLocaleDateString("en-GB", { month: "long", year: "numeric" });
  const dow = ["M", "T", "W", "T", "F", "S", "S"];

  let cells = "";
  for (let i = 0; i < startOffset; i++) cells += `<div class="calcell empty"></div>`;
  for (let day = 1; day <= daysInMonth; day++) {
    const iso = year + "-" + String(month + 1).padStart(2, "0") + "-" + String(day).padStart(2, "0");
    const has = byDate[iso];
    cells += `<div class="calcell${iso === today ? " today" : ""}${has ? " has" : ""}" data-calday="${iso}">
      <span class="calnum">${day}</span>${has ? `<span class="caldot"></span>` : ""}
    </div>`;
  }

  return `<div class="cal">
    <div class="calhead">
      <button class="icon calarrow" data-calnav="-1">‹</button>
      <div class="calhead-mid"><strong>${esc(monthLabel)}</strong> <span class="caltoday" data-caltoday="1">Today</span></div>
      <button class="icon calarrow" data-calnav="1">›</button>
    </div>
    <div class="calgrid caldow">${dow.map((d) => `<div class="calcell dowlabel">${d}</div>`).join("")}</div>
    <div class="calgrid">${cells}</div>
  </div>`;
}

function viewDates() {
  return sectionHeader("Important Dates", "Tap a marked day to jump to it below.", "dates") +
    panel("Calendar", calendarHTML(calCursor)) +
    collectionHTML("dates", DB.dates);
}

function render() {
  $$(".nav a").forEach((a) => a.classList.toggle("active", a.dataset.sec === current));
  const el = $("#view");
  let html = "";
  switch (current) {
    case "dashboard": html = viewDashboard(); break;
    case "thesis": html = viewThesis(); break;
    case "viva": html = viewViva(); break;
    case "tasks": html = simpleCollectionView("tasks", "Tasks", "Everything on your plate."); break;
    case "habits": html = viewHabits(); break;
    case "money": html = viewMoney(); break;
    case "pocket": html = viewPocket(); break;
    case "weekly": html = simpleCollectionView("weekly", "Weekly Review", "Logged each Monday."); break;
    case "skincare": html = simpleCollectionView("skincare", "Skincare & Makeup", "Open dates and PAO countdowns."); break;
    case "dates": html = viewDates(); break;
    case "contacts": html = simpleCollectionView("contacts", "Contacts", ""); break;
    case "notes": html = simpleCollectionView("notes", "Notes / Journal", ""); break;
    default: current = "dashboard"; html = viewDashboard();
  }
  el.innerHTML = html;
  el.scrollTop = 0;
  if (current === "pocket") PK.mount($("#pkApp"));
  if (current === "money") buildMoneyCharts();
  closeDrawer();
}

/* ---------- Pocket (daily spending) — embedded, own storage key ----------
   Same storage key as the standalone Pocket app. Because both live on the
   same GitHub Pages origin, real transactions already logged in Pocket
   show up here automatically — no import needed. */
const PK = (function () {
  const STORE_KEY = "pocket-tracker:v1";
  const CUR = "RM";
  const CATS = {
    food:      { label: "Food",      emoji: "🍜", color: "#FF7A45" },
    coffee:    { label: "Coffee",    emoji: "☕", color: "#B5651D" },
    groceries: { label: "Groceries", emoji: "🛒", color: "#2FA968" },
    transport: { label: "Transport", emoji: "🚗", color: "#3B82C4" },
    shopping:  { label: "Shopping",  emoji: "🛍️", color: "#E0559B" },
    bills:     { label: "Bills",     emoji: "🧾", color: "#64748B" },
    fun:       { label: "Fun",       emoji: "🎉", color: "#8B5CF6" },
    study:     { label: "Study",     emoji: "📚", color: "#14B8A6" },
    other:     { label: "Other",     emoji: "✨", color: "#94A3B8" },
  };
  const INCOME_CATS = {
    allowance:   { label: "Allowance",   emoji: "💰", color: "#2FA968" },
    scholarship: { label: "Scholarship", emoji: "🎓", color: "#14B8A6" },
    parttime:    { label: "Part-time",   emoji: "💼", color: "#3B82C4" },
    gift:        { label: "Gift",        emoji: "🎁", color: "#E0559B" },
    other_in:    { label: "Other",       emoji: "➕", color: "#94A3B8" },
  };
  const CAT_KEYS = Object.keys(CATS);
  const INCOME_KEYS = Object.keys(INCOME_CATS);
  const NAME = "Syamimi";
  const catInfo = (t) => ((t.type === "income") ? INCOME_CATS : CATS)[t.cat] || { label: "Other", emoji: "✨", color: "#94A3B8" };

  let txns = [];
  try {
    const raw = localStorage.getItem(STORE_KEY);
    if (raw) { const p = JSON.parse(raw); if (Array.isArray(p.txns)) txns = p.txns.map((t) => t.type ? t : { ...t, type: "expense" }); }
  } catch (e) {}
  function pkSave() { try { localStorage.setItem(STORE_KEY, JSON.stringify({ txns })); } catch (e) {} }

  const fmt = (n) => n.toLocaleString("en-MY", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  const dayKey = (d) => { const x = new Date(d); return x.getFullYear() + "-" + x.getMonth() + "-" + x.getDate(); };
  function relDay(ts) {
    const now = new Date(), d = new Date(ts);
    if (dayKey(d) === dayKey(now)) return "today";
    if (dayKey(d) === dayKey(now.getTime() - 864e5)) return "yesterday";
    return d.toLocaleDateString("en-MY", { day: "numeric", month: "short" });
  }
  function txRowHtml(t) {
    const ci = catInfo(t);
    const isIn = t.type === "income";
    return '<div class="pk-tx"><div class="pk-emoji" style="background:' + ci.color + '1F">' + ci.emoji + '</div>' +
      '<div class="pk-txmid"><div class="pk-txname">' + esc(t.note || ci.label) + '</div>' +
      '<div class="pk-txmeta">' + ci.label + ' · ' + relDay(t.ts) + '</div></div>' +
      '<span class="pk-txamt' + (isIn ? ' in' : '') + '">' + (isIn ? '+ ' : '') + CUR + ' ' + fmt(t.amount) + '</span>' +
      '<button class="pk-del" data-pkdel="' + t.id + '" aria-label="delete">×</button></div>';
  }
  const todayStr = () => { const d = new Date(); const p = (n) => String(n).padStart(2, "0"); return d.getFullYear() + "-" + p(d.getMonth() + 1) + "-" + p(d.getDate()); };
  function tsForDate(dateStr) {
    const sel = new Date(dateStr + "T00:00:00");
    const now = new Date();
    sel.setHours(now.getHours(), now.getMinutes(), now.getSeconds(), now.getMilliseconds());
    return sel.getTime();
  }

  function compute() {
    const now = new Date();
    const inMonth = (t) => { const d = new Date(t.ts); return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear(); };
    const monthTx = txns.filter(inMonth);
    const exp = monthTx.filter((t) => t.type === "expense");
    const out = exp.reduce((s, t) => s + t.amount, 0);
    const inc = monthTx.filter((t) => t.type === "income").reduce((s, t) => s + t.amount, 0);
    const left = inc - out;
    const m = {}; exp.forEach((t) => { m[t.cat] = (m[t.cat] || 0) + t.amount; });
    const byCat = Object.entries(m).map(([cat, amt]) => ({ cat, amt })).sort((a, b) => b.amt - a.amt);
    let streak = 0;
    if (txns.length) {
      const days = new Set(txns.map((t) => dayKey(t.ts)));
      let cur = new Date();
      if (!days.has(dayKey(cur))) cur = new Date(cur.getTime() - 864e5);
      while (days.has(dayKey(cur))) { streak++; cur = new Date(cur.getTime() - 864e5); }
    }
    const recent = [...txns].sort((a, b) => b.ts - a.ts).slice(0, 12);
    const h = now.getHours();
    const greeting = h < 12 ? "good morning" : h < 18 ? "good afternoon" : "good evening";
    const monthName = now.toLocaleDateString("en-MY", { month: "long" });
    return { out, inc, left, byCat, streak, recent, greeting, monthName };
  }

  let mountEl = null;

  function panelHTML() {
    const { out, inc, left, byCat, streak, recent, greeting, monthName } = compute();

    const streakHtml = streak > 0
      ? '<div class="pk-streak"><span class="flame">🔥</span>' + streak + ' day' + (streak > 1 ? 's' : '') + '</div>'
      : '<div class="pk-streak dim">no streak yet</div>';

    const negative = left < 0;
    const heroLabel = negative ? ('over by · ' + monthName) : ('left in ' + monthName);
    const heroVal = fmt(Math.abs(left));

    let stream = "";
    if (out > 0) {
      stream = '<div class="pk-stream">' +
        byCat.map((c) => '<div class="pk-seg" data-w="' + ((c.amt / out) * 100) + '%" style="background:' + CATS[c.cat].color + '"></div>').join('') +
        '</div><div class="pk-legend">' +
        byCat.slice(0, 5).map((c) => '<span class="pk-leg"><span class="pk-dot" style="background:' + CATS[c.cat].color + '"></span>' + CATS[c.cat].label + '</span>').join('') +
        '</div>';
    }

    let body = "";
    if (out === 0) {
      body = '<div class="pk-empty"><div class="big">👛</div><h3>Nothing spent yet</h3>' +
        '<p>Add your allowance and your first expense — your month takes shape right here.</p></div>';
    } else {
      body = '<div class="pk-sec"><div class="pk-sec-h">where it goes</div>' +
        byCat.map((c) => {
          const pct = (c.amt / out) * 100;
          return '<div class="pk-row" data-pkcatrow="' + c.cat + '"><div class="pk-emoji" style="background:' + CATS[c.cat].color + '1F">' + CATS[c.cat].emoji + '</div>' +
            '<div class="pk-rowmid"><div class="pk-rowtop"><span class="pk-cat">' + CATS[c.cat].label + '</span>' +
            '<span class="pk-amt">' + CUR + ' ' + fmt(c.amt) + '</span></div>' +
            '<div class="pk-bar"><i data-w="' + pct + '%" style="background:' + CATS[c.cat].color + '"></i></div></div>' +
            '<span class="pk-pct">' + Math.round(pct) + '%</span></div>';
        }).join('') + '</div>';
    }

    let recentHtml = "";
    if (recent.length) {
      recentHtml = '<div class="pk-sec"><div class="pk-sec-h" style="display:flex;justify-content:space-between;align-items:center;">recent' +
        (txns.length > recent.length ? '<span class="pk-seeall" data-pkseeall="1">See all →</span>' : '') +
        '</div>' + recent.map(txRowHtml).join('') + '</div>';
    }

    return '<div class="pk-head"><div class="pk-hi">' + greeting + ', <b>' + NAME + '</b></div>' + streakHtml + '</div>' +
      '<div class="pk-hero"><div class="pk-label">' + heroLabel + '</div>' +
      '<div class="pk-total pk-display' + (negative ? ' neg' : '') + '"><span class="cur">' + CUR + '</span>' + heroVal + '</div>' +
      '<div class="pk-inout">' +
      '<span class="pk-io"><span class="pk-iodot" style="background:var(--pk-green)"></span>In · ' + CUR + ' ' + fmt(inc) + '</span>' +
      '<span class="pk-io"><span class="pk-iodot" style="background:var(--pk-coral)"></span>Out · ' + CUR + ' ' + fmt(out) + '</span>' +
      '</div>' + stream + '</div>' +
      '<button class="pk-addbtn" data-pkadd="1">+ Add transaction</button>' +
      '<div class="pk-importrow"><span class="pk-importlink" data-pkimport="1">Import old Pocket backup</span></div>' +
      body + recentHtml;
  }

  function refresh() {
    if (!mountEl) return;
    mountEl.innerHTML = panelHTML();
    requestAnimationFrame(() => { mountEl.querySelectorAll('[data-w]').forEach((el) => { el.style.width = el.dataset.w; }); });
    mountEl.querySelectorAll('[data-pkdel]').forEach((b) => b.onclick = (e) => { e.stopPropagation(); txns = txns.filter((t) => t.id !== b.dataset.pkdel); pkSave(); refresh(); });
    mountEl.querySelectorAll('[data-pkcatrow]').forEach((el) => el.onclick = () => openCategoryDetail(el.dataset.pkcatrow));
    const addBtn = mountEl.querySelector('[data-pkadd]');
    if (addBtn) addBtn.onclick = openAdd;
    const importLink = mountEl.querySelector('[data-pkimport]');
    if (importLink) importLink.onclick = () => document.getElementById("pkImportInput").click();
    const seeAllBtn = mountEl.querySelector('[data-pkseeall]');
    if (seeAllBtn) seeAllBtn.onclick = openAllTransactions;
  }

  /* ── add sheet ── */
  let amountStr = "", noteVal = "", mode = "expense", dateVal = "";
  function openAdd() {
    amountStr = ""; noteVal = ""; mode = "expense"; dateVal = todayStr();
    const scrim = document.createElement("div");
    scrim.className = "pk-scrim";
    scrim.innerHTML =
      '<div class="pk-sheet"><div class="pk-grab"></div>' +
      '<div class="pk-seg2"><button data-mode="expense" class="on">Expense</button><button data-mode="income">Income</button></div>' +
      '<div class="pk-daterow"><span class="pk-datelabel">📅 Date</span><input type="date" class="pk-dateinput" id="pkDateInput" value="' + dateVal + '" max="' + todayStr() + '" /></div>' +
      '<div class="pk-amtbox"><span class="cur">' + CUR + '</span><span class="val ph" id="pkAmtVal">0</span></div>' +
      '<input class="pk-note" id="pkNoteInput" placeholder="What was it? (optional)" maxlength="40" />' +
      '<div class="pk-chips" id="pkChips"></div>' +
      '<div class="pk-pad">' + ["1", "2", "3", "4", "5", "6", "7", "8", "9", ".", "0", "del"].map((k) => '<button class="pk-key" data-key="' + k + '">' + (k === "del" ? "⌫" : k) + '</button>').join('') + '</div>' +
      '<div class="pk-hint" id="pkHint">enter an amount first</div></div>';
    document.body.appendChild(scrim);
    document.body.style.overflow = "hidden";

    scrim.addEventListener("click", (e) => { if (e.target === scrim) closeSheet(scrim); });
    scrim.querySelector("#pkNoteInput").addEventListener("input", (e) => noteVal = e.target.value);
    scrim.querySelector("#pkDateInput").addEventListener("change", (e) => dateVal = e.target.value || todayStr());
    scrim.querySelectorAll("[data-key]").forEach((b) => b.onclick = () => { press(b.dataset.key); updateSheet(scrim); });
    scrim.querySelectorAll("[data-mode]").forEach((b) => b.onclick = () => {
      mode = b.dataset.mode;
      scrim.querySelectorAll("[data-mode]").forEach((x) => x.className = (x.dataset.mode === mode ? "on" + (mode === "income" ? " inc" : "") : ""));
      renderChips(scrim); updateSheet(scrim);
    });
    renderChips(scrim); updateSheet(scrim);
  }
  function closeSheet(scrim) { scrim.remove(); document.body.style.overflow = ""; }

  function openDetailSheet(titleHtml, list) {
    const scrim = document.createElement("div");
    scrim.className = "pk-scrim";
    scrim.innerHTML =
      '<div class="pk-sheet" style="max-height:80vh;overflow-y:auto;"><div class="pk-grab"></div>' +
      titleHtml +
      (list.length ? list.map(txRowHtml).join('') : '<div class="pk-empty"><p>Nothing here yet.</p></div>') +
      '</div>';
    document.body.appendChild(scrim);
    document.body.style.overflow = "hidden";
    scrim.addEventListener("click", (e) => { if (e.target === scrim) closeSheet(scrim); });
    scrim.querySelectorAll("[data-pkdel]").forEach((b) => b.onclick = () => {
      txns = txns.filter((t) => t.id !== b.dataset.pkdel); pkSave(); closeSheet(scrim); refresh();
    });
  }
  function openCategoryDetail(cat) {
    const now = new Date();
    const inMonth = (t) => { const d = new Date(t.ts); return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear(); };
    const list = txns.filter((t) => t.type === "expense" && t.cat === cat && inMonth(t)).sort((a, b) => b.ts - a.ts);
    const total = list.reduce((s, t) => s + t.amount, 0);
    const info = CATS[cat];
    const title = '<div style="display:flex;align-items:center;gap:10px;margin-bottom:6px;">' +
      '<div class="pk-emoji" style="background:' + info.color + '1F">' + info.emoji + '</div>' +
      '<div><div style="font-weight:800;font-size:17px;">' + info.label + '</div>' +
      '<div style="color:var(--pk-muted);font-size:12.5px;font-weight:600;">' + CUR + ' ' + fmt(total) + ' this month · ' + list.length + ' transaction' + (list.length !== 1 ? 's' : '') + '</div></div></div>';
    openDetailSheet(title, list);
  }
  function openAllTransactions() {
    const list = [...txns].sort((a, b) => b.ts - a.ts);
    const title = '<div style="font-weight:800;font-size:17px;margin-bottom:6px;">All transactions</div>' +
      '<div style="color:var(--pk-muted);font-size:12.5px;font-weight:600;margin-bottom:4px;">' + list.length + ' total</div>';
    openDetailSheet(title, list);
  }

  function renderChips(scrim) {
    const keys = mode === "income" ? INCOME_KEYS : CAT_KEYS;
    const map = mode === "income" ? INCOME_CATS : CATS;
    scrim.querySelector("#pkChips").innerHTML =
      keys.map((k) => '<button class="pk-chip" data-cat="' + k + '" disabled><span class="ce">' + map[k].emoji + '</span><span class="cl">' + map[k].label + '</span></button>').join('');
    scrim.querySelectorAll("[data-cat]").forEach((b) => b.onclick = () => commit(b.dataset.cat, scrim));
  }
  function press(k) {
    if (k === "del") { amountStr = amountStr.slice(0, -1); return; }
    if (k === ".") { if (amountStr.includes(".")) return; amountStr = amountStr === "" ? "0." : amountStr + "."; return; }
    if (amountStr.includes(".") && amountStr.split(".")[1].length >= 2) return;
    if (amountStr === "0") { amountStr = k; return; }
    if ((amountStr + k).replace(".", "").length > 8) return;
    amountStr += k;
  }
  function updateSheet(scrim) {
    const amt = parseFloat(amountStr || "0");
    const can = amt > 0;
    const val = scrim.querySelector("#pkAmtVal");
    val.textContent = amountStr === "" ? "0" : amountStr;
    val.className = "val" + (amountStr === "" ? " ph" : "");
    const armClass = mode === "income" ? "armed-in" : "armed";
    scrim.querySelectorAll("[data-cat]").forEach((c) => {
      c.disabled = !can;
      c.classList.remove("armed", "armed-in");
      if (can) c.classList.add(armClass);
    });
    scrim.querySelector("#pkHint").textContent = can
      ? (mode === "income" ? "tap a source to save" : "tap a category to save")
      : "enter an amount first";
  }
  function commit(cat, scrim) {
    const amt = parseFloat(amountStr || "0");
    if (!(amt > 0)) return;
    const ts = tsForDate(dateVal || todayStr());
    txns.unshift({ id: Date.now() + "-" + Math.random().toString(36).slice(2, 6), amount: amt, cat, type: mode, note: noteVal.trim(), ts });
    pkSave(); closeSheet(scrim); refresh();
  }

  function importBackup(jsonText) {
    const data = JSON.parse(jsonText);
    const incoming = Array.isArray(data.txns) ? data.txns : (Array.isArray(data) ? data : null);
    if (!incoming) throw new Error("bad format");
    const existingIds = new Set(txns.map((t) => t.id));
    let added = 0;
    incoming.forEach((t) => {
      if (!t || !t.id || existingIds.has(t.id)) return;
      if (typeof t.amount !== "number" || !t.ts) return;
      txns.push({ id: t.id, amount: t.amount, cat: t.cat, type: t.type || "expense", note: t.note || "", ts: t.ts });
      existingIds.add(t.id);
      added++;
    });
    if (added > 0) { pkSave(); refresh(); }
    return added;
  }

  return { mount(el) { mountEl = el; refresh(); }, importBackup };
})();

/* ---------- events (delegation) ---------- */
document.addEventListener("click", (e) => {
  const t = e.target;

  const nav = t.closest("[data-sec]");
  if (nav) { current = nav.dataset.sec; location.hash = current; render(); return; }

  const add = t.closest("[data-add]");
  if (add) { openForm(add.dataset.add); return; }

  const rowBtn = t.closest("[data-act]");
  if (rowBtn) {
    const row = rowBtn.closest(".listrow");
    const coll = row.dataset.coll, id = row.dataset.id;
    if (rowBtn.dataset.act === "edit") openForm(coll, id);
    else if (rowBtn.dataset.act === "del") {
      if (confirm("Delete this entry?")) { DB[coll] = DB[coll].filter((r) => r.id !== id); save(); render(); }
    }
    return;
  }

  if (t.closest("[data-editviva]")) {
    const v = prompt("Viva date (YYYY-MM-DD), or leave blank for TBC:", DB.meta.vivaDate || "");
    if (v !== null) { DB.meta.vivaDate = v.trim(); save(); render(); }
    return;
  }
  if (t.closest("[data-editgoal]")) {
    const label = prompt("Goal name:", DB.savings.label); if (label === null) return;
    const target = prompt("Target amount (RM):", DB.savings.target); if (target === null) return;
    const saved = prompt("Saved so far (RM):", DB.savings.saved); if (saved === null) return;
    DB.savings = { label: label.trim() || DB.savings.label, target: Number(target) || 0, saved: Number(saved) || 0 };
    save(); render(); return;
  }
  if (t.closest("[data-newhabit]")) {
    const inp = $("#newHabit"); if (inp && inp.value.trim()) { DB.habits.push({ id: uid(), name: inp.value.trim() }); save(); render(); }
    return;
  }
  const delh = t.closest("[data-delhabit]");
  if (delh) { if (confirm("Delete this habit?")) { DB.habits = DB.habits.filter((h) => h.id !== delh.dataset.delhabit); save(); render(); } return; }

  if (t.id === "modalSave") { submitForm(); return; }
  if (t.id === "modalCancel" || t.id === "modalBackdrop") { closeForm(); return; }
  if (t.id === "menuBtn") { $("#sidebar").classList.toggle("open"); return; }
  if (t.id === "drawerBackdrop") { closeDrawer(); return; }

  if (t.id === "backupBtn") { doBackup(); return; }
  if (t.id === "restoreBtn") { $("#restoreInput").click(); return; }

  const themePick = t.closest("[data-theme-pick]");
  if (themePick) {
    const id = themePick.dataset.themePick;
    DB.meta.theme = id; applyTheme(id); save(); buildThemeRow();
    return;
  }

  const calNav = t.closest("[data-calnav]");
  if (calNav) { calCursor = new Date(calCursor.getFullYear(), calCursor.getMonth() + Number(calNav.dataset.calnav), 1); render(); return; }
  if (t.closest("[data-caltoday]")) { calCursor = firstOfMonth(new Date()); render(); return; }
  const calDay = t.closest("[data-calday]");
  if (calDay) {
    const iso = calDay.dataset.calday;
    const match = DB.dates.find((d) => d.date === iso);
    if (match) {
      const row = document.querySelector('.listrow[data-coll="dates"][data-id="' + match.id + '"]');
      if (row) {
        row.scrollIntoView({ behavior: "smooth", block: "center" });
        row.classList.add("pulse");
        setTimeout(() => row.classList.remove("pulse"), 1400);
      }
    }
    return;
  }
});

document.addEventListener("change", (e) => {
  const t = e.target;
  if (t.dataset.hlog) { const k = t.dataset.hlog; if (t.checked) DB.habitLog[k] = true; else delete DB.habitLog[k]; save(); refreshDashCountsIfNeeded(); return; }
  if (t.dataset.chk) { DB._check = DB._check || {}; DB._check[t.dataset.chk + t.dataset.ci] = t.checked; save(); return; }
  if (t.id === "restoreInput" && t.files && t.files[0]) {
    const fr = new FileReader();
    fr.onload = () => {
      try { const data = JSON.parse(fr.result); DB = Object.assign(seed(), data); save(); render(); alert("Backup restored."); }
      catch (err) { alert("That file couldn't be read as a backup."); }
    };
    fr.readAsText(t.files[0]);
  }
  if (t.id === "pkImportInput" && t.files && t.files[0]) {
    const fr = new FileReader();
    fr.onload = () => {
      try {
        const count = PK.importBackup(fr.result);
        alert(count > 0 ? ("Imported " + count + " transaction" + (count !== 1 ? "s" : "") + ".") : "No new transactions found in that file — they may already be here.");
      } catch (err) { alert("That file couldn't be read as a Pocket backup."); }
    };
    fr.readAsText(t.files[0]);
    t.value = "";
  }
});

function refreshDashCountsIfNeeded() { if (current === "dashboard") render(); }

function closeDrawer() { $("#sidebar").classList.remove("open"); }

function doBackup() {
  DB.meta.lastBackup = todayISO(); save();
  const blob = new Blob([JSON.stringify(DB, null, 2)], { type: "application/json" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "planner-backup-" + todayISO() + ".json";
  a.click();
  URL.revokeObjectURL(a.href);
  if (current === "dashboard") render();
}

window.addEventListener("hashchange", () => { const h = location.hash.replace("#", ""); if (h && h !== current) { current = h; render(); } });

/* ---------- build sidebar nav ---------- */
function buildNav() {
  $("#nav").innerHTML = SECTIONS.map((s) =>
    `<a data-sec="${s.id}" class="${s.id === current ? "active" : ""}"><span class="dot ${s.dot}"></span>${esc(s.label)}</a>`).join("");
}

applyTheme(DB.meta.theme);
buildNav();
buildThemeRow();
render();

</script>
</body>
</html>
